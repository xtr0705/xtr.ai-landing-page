<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XTR.ai</title>
  <script src="https://cdn.tailwindcss.com" ></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>


  
<div class="js-container"></div>

<script src="https://unpkg.com/supersimpledev/react.js"></script>
<script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://unpkg.com/supersimpledev/babel.js"></script>

  <script type="text/babel">
    const eye = <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.5"        stroke="currentColor" className="size-6">
    <path strokeLinecap="round" strokeLinejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
    <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
    </svg>

    const notes=<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.5" stroke="currentColor" className="size-6">
    <path strokeLinecap="round" strokeLinejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
    </svg>

    const task = <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.5" stroke="currentColor" className="size-6">
    <path strokeLinecap="round" strokeLinejoin="round" d="M6 6.878V6a2.25 2.25 0 0 1 2.25-2.25h7.5A2.25 2.25 0 0 1 18 6v.878m-12 0c.235-.083.487-.128.75-.128h10.5c.263 0 .515.045.75.128m-12 0A2.25 2.25 0 0 0 4.5 9v.878m13.5-3A2.25 2.25 0 0 1 19.5 9v.878m0 0a2.246 2.246 0 0 0-.75-.128H5.25c-.263 0-.515.045-.75.128m15 0A2.25 2.25 0 0 1 21 12v6a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 18v-6c0-.98.626-1.813 1.5-2.122" />
    </svg>



    function NavBar(){
      return(
        <div className="px-6 md:px-12 py-4" >
          <div className="max-w-6xl mx-auto flex justify-between items-center" >
            <h1 className="text-lg md:text-xl bg-gradient-to-r from-black to-blue-500 inline-block text-transparent bg-clip-text font-bold" >XTR.ai</h1>
  
            <div className="flex gap-6 text-xs font-semibold text-black" >
              <a className="cursor-pointer hover:scale-105 transition hover:[text-shadow:0_0_8px_rgba(59,130,246,0.7)] transition" >
                Features
              </a>
              <a className="cursor-pointer hover:scale-105 transition hover:[text-shadow:0_0_8px_rgba(59,130,246,0.7)] transition" >
                How it works
              </a>
              <a className="cursor-pointer hover:scale-105 transition hover:[text-shadow:0_0_8px_rgba(59,130,246,0.7)] transition" >
                Pricing
              </a>
            </div>
  
            <button className=" hidden md:block text-[11px] bg-blue-500 text-white px-3 py-1 rounded-lg hover:bg-gray-600 hover:scale-105 active:scale-95 transition" >
              Get Started
            </button>
            <button className="md:hidden text-2xl">
              ☰
            </button>
          </div>
        </div>
      );
    }

    function Hero(){
      return(
        <div className="flex flex-col items-center text-center mt-16 md:mt-24 px-2 md:px-4" data-aos="fade-up" data-aos-delay="200" >
          <h1 className="text-[56px]  font-bold max-w-[700px] leading-tight " data-aos="fade-up" >Supercharge Your Productivity with AI</h1>
          <p className="text-gray-700 mt-6 max-w-[600px] text-[18px]" data-aos="fade-up" data-aos-delay="100" >
            Organize tasks, generate ideas, and stay focused 
            -all in one powerful workplace
          </p>

          <div className="flex flex-col md:flex-row gap-3 md:gap-4 mt-6 md:mt-8  md:w-auto" >
            <button className="bg-blue-500 text-[11px] text-white px-5 py-2 rounded-lg hover:bg-gray-600 transition hover:scale-105" data-aos="fade-up"  >
              Get Started Free
            </button>
            <button className="bg-blue-500 text-[11px] text-white px-5 py-2 rounded-lg hover:bg-gray-600 transition hover:scale-105" data-aos="fade-up" >
              Watch Demo
            </button>
          </div>
        </div>
      );
    }

    function Features(){
      return(
        <div className="mt-36 text-center px-6" >
          <h2 data-aos="fade-up" className="text-3xl font-bold">
            Everything you need to stay ahead  
          </h2>
          
          <div data-aos="zoom-in" className="flex justify-center gap-10 mt-16 flex-wrap" >
            <FeatureCard 
          icon={notes}
          title="AI - Powered Notes"
          description="Capture ideas instantly and let AI organize them for you"
          />
          <FeatureCard 
          icon={task}
          title="Task Management"
          description="Plan your day with intelligent suggestions and reminders"
          />
          <FeatureCard 
          icon={eye}
          title="Instant Insights"
          description="Get summaries, answers, and clarity in seconds"
          />
          </div>         

        </div>
      );
    }

    function FeatureCard({icon,title,description}){
      return(
        <div className="group bg-black text-white p-8 rounded-xl w-[280px] shadow-md hover:shadow-xl hover:scale-105 hover:bg-slate-900 transition-all duration-300 border border-transparent hover:border-blue-400" >
          <p className="text-blue-400 text-3xl transition duration-300 group-hover:scale-110" >{icon}</p>
          <h3 className="mt-4 font-semibold text-lg group-hover:text-blue-400 transition " >{title}</h3>
          <p className="text-sm text-gray-400 mt-2">{description}</p>  
        </div>
      );
    }

    function CTA (){
      return(
        <div className="mt-36 flex justify-center px-4" >
          <div data-aos="fade-up" className="bg-black text-white rounded-[18px] p-[56px] text-center max-w-[800px] shadow-lg" >
            <h2 className="text-[36px] font-bold" >
              Ready to boost your productivity?  
            </h2> 

            <p className="text-gray-400 mt-4 max-w-[500px] mx-auto" >
              Start using XTR.ai today and experience the power of AI
            </p>

            <button className="mt-8 bg-blue-500 px-5 py-2 rounded-lg hover:bg-gray-600 hover:scale-105  transition" >
              Get Started Now
            </button>

            <p className="text-sm text-gray-500 mt-3" >
              No credit card required
            </p>
          </div>  
        </div>
      );
    }

    function Footer(){
      return(
        <div className="mt-32 border-t pt-8 pb-6 text-center text-sm text-gray-500" >
          © 2026 XTR.ai. All rights reserved.
        </div>
      );
    }


    function App(){
      return(
        <div className="min-h-screen bg-gradient-to-b from-white via-blue-400 to-white
        " style={{fontFamily: "Sora"}}>
          <NavBar />
          <Hero />
          <Features />
          <CTA />
          <Footer />
        </div>
      );
    }

    
    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<App />)

    setTimeout(() => {
      AOS.init({
        duration: 800,
        once: true
      });
    }, 100);
  </script>

</body>
</html>
